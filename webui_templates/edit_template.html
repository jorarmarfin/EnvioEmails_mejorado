{% extends "base.html" %}
{% block title %}Editar {{ filename }}{% endblock %}
{% block content %}
<div class="page-head">
    <h1>Editor de Template</h1>
    <p class="muted">Archivo actual: <strong>{{ filename }}</strong></p>
</div>

<div class="card">
    <form method="post">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
        <label for="content">Contenido HTML</label>
        <textarea id="content" name="content" spellcheck="false">{{ content }}</textarea>
        <div class="actions">
            <button class="btn btn-success" type="submit">Guardar cambios</button>
            <a class="btn btn-outline" href="{{ url_for('view_template', filename=filename) }}">Ver HTML</a>
            <a class="btn btn-light" href="{{ url_for('files', section='templates') }}">Volver</a>
        </div>
    </form>
</div>
{% endblock %}
